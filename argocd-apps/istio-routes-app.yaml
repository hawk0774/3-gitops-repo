apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istio-routes
  namespace: argocd
spec:
  project: default
  source:
    repoURL: "https://github.com/hawk0774/3-gitops-repo.git"
    targetRevision: main
    path: manifests/istio
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
