grafana:
  service:
    type: ClusterIP
    port: 80
  grafana.ini:
    server:
      domain: localhost
      root_url: "%(protocol)s://%(domain)s/grafana/"
      serve_from_sub_path: false   

prometheus:
  prometheusSpec:
    externalUrl: "http://localhost/prometheus"
    routePrefix: /prometheus

prometheusOperator:
  admissionWebhooks:
    enabled: false
    patch:
      enabled: false
  tls:
    enabled: false
